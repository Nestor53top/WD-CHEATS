name: Decompile Trainers (dnSpy + ILSpy)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  decompile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install ILSpy CLI
        run: dotnet tool install --global ilspycmd

      - name: Download dnSpyEx
        run: |
          $url = "https://github.com/dnSpyEx/dnSpy/releases/latest/download/dnSpy-net-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile dnSpy.zip
          Expand-Archive -Path dnSpy.zip -DestinationPath dnSpy -Force
        shell: pwsh

      - name: Try ILSpy on all exes
        run: |
          $exes = @(
            "WD2_FLiNG_Trainer.exe",
            "WD2_FLiNG_EAC.exe",
            "WD2_Generic_Trainer.exe",
            "WD2_Baracuda_Trainer.exe"
          )
          foreach ($exe in $exes) {
            $name = [IO.Path]::GetFileNameWithoutExtension($exe)
            $outDir = "output\${name}"
            New-Item -ItemType Directory -Path $outDir -Force

            Write-Host "=== ILSpy: $exe ==="
            try {
              ilspycmd -p -o "$outDir\ilspy_project" "$exe" 2>&1
              Write-Host "ILSpy decompiled OK"
            } catch {
              "ILSpy result: Not a .NET assembly - $($_.Exception.Message)" | Out-File "$outDir\ilspy_result.txt"
              Write-Host "ILSpy: not .NET"
            }
          }
        shell: pwsh

      - name: Try dnSpy on all exes
        run: |
          $exes = @(
            "WD2_FLiNG_Trainer.exe",
            "WD2_FLiNG_EAC.exe",
            "WD2_Generic_Trainer.exe",
            "WD2_Baracuda_Trainer.exe"
          )
          foreach ($exe in $exes) {
            $name = [IO.Path]::GetFileNameWithoutExtension($exe)
            $outDir = "output\${name}"
            New-Item -ItemType Directory -Path $outDir -Force

            Write-Host "=== dnSpy: $exe ==="
            $dnSpyExe = Get-ChildItem -Path "dnSpy" -Recurse -Filter "dnSpy.exe" | Select-Object -First 1
            if ($dnSpyExe) {
              "dnSpy found at: $($dnSpyExe.FullName)" | Out-File "$outDir\dnspy_result.txt"
              "dnSpy is a GUI tool - manual inspection required for native PE analysis." | Out-File "$outDir\dnspy_result.txt" -Append
              "dnSpy can decompile .NET assemblies only. This PE is native code." | Out-File "$outDir\dnspy_result.txt" -Append
            } else {
              "dnSpy.exe not found in package" | Out-File "$outDir\dnspy_result.txt"
            }
          }
        shell: pwsh

      - name: Deep PE analysis via C# script
        run: |
          $script = @'
          using System;
          using System.IO;
          using System.Text;
          using System.Reflection.PortableExecutable;
          using System.Reflection.Metadata;
          using System.Collections.Generic;

          class Program
          {
              static void Main(string[] args)
              {
                  string[] exes = {
                      "WD2_FLiNG_Trainer.exe",
                      "WD2_FLiNG_EAC.exe",
                      "WD2_Generic_Trainer.exe",
                      "WD2_Baracuda_Trainer.exe"
                  };

                  foreach (var exe in exes)
                  {
                      var name = Path.GetFileNameWithoutExtension(exe);
                      var outDir = $"output/{name}";
                      Directory.CreateDirectory(outDir);

                      try
                      {
                          var sb = new StringBuilder();
                          sb.AppendLine($"=== PE Analysis: {exe} ===");
                          sb.AppendLine($"Size: {new FileInfo(exe).Length} bytes");
                          sb.AppendLine();

                          using var fs = new FileStream(exe, FileMode.Open, FileAccess.Read);
                          using var peReader = new PEReader(fs);

                          var hdr = peReader.PEHeaders;
                          sb.AppendLine($"Machine: {hdr.CoffHeader.Machine}");
                          sb.AppendLine($"Timestamp: {DateTimeOffset.FromUnixTimeSeconds(hdr.CoffHeader.TimeDateStamp)}");
                          sb.AppendLine($"Subsystem: {hdr.PEHeaders.PEHeader.Subsystem}");
                          sb.AppendLine($"DLL Characteristics: {hdr.PEHeaders.PEHeader.DllCharacteristics}");
                          sb.AppendLine($"Image base: 0x{hdr.PEHeaders.PEHeader.ImageBase:X}");
                          sb.AppendLine($"Section alignment: 0x{hdr.PEHeaders.PEHeader.SectionAlignment:X}");
                          sb.AppendLine($"File alignment: 0x{hdr.PEHeaders.PEHeader.FileAlignment:X}");
                          sb.AppendLine($"Subsystem major: {hdr.PEHeaders.PEHeader.MajorSubsystemVersion}");
                          sb.AppendLine($"Subsystem minor: {hdr.PEHeaders.PEHeader.MinorSubsystemVersion}");
                          sb.AppendLine($"Image major: {hdr.PEHeaders.PEHeader.MajorImageVersion}");
                          sb.AppendLine($"Image minor: {hdr.PEHeaders.PEHeader.MinorImageVersion}");
                          sb.AppendLine($"Stack reserve: 0x{hdr.PEHeaders.PEHeader.SizeOfStackReserve:X}");
                          sb.AppendLine($"Stack commit: 0x{hdr.PEHeaders.PEHeader.SizeOfStackCommit:X}");
                          sb.AppendLine($"Heap reserve: 0x{hdr.PEHeaders.PEHeader.SizeOfHeapReserve:X}");
                          sb.AppendLine($"Heap commit: 0x{hdr.PEHeaders.PEHeader.SizeOfHeapCommit:X}");
                          sb.AppendLine();

                          sb.AppendLine("--- Sections ---");
                          foreach (var sec in hdr.SectionHeaders)
                          {
                              sb.AppendLine($"  {sec.Name}: VirtualSize=0x{sec.VirtualSize:X} VirtualAddress=0x{sec.VirtualAddress:X} RawSize=0x{sec.RawDataSize:X} Chars={sec.SectionCharacteristics}");
                          }
                          sb.AppendLine();

                          sb.AppendLine("--- Data Directories ---");
                          var dirs = hdr.PEHeaders.PEHeader.DataDirectories;
                          string[] dirNames = { "Export", "Import", "Resource", "Exception", "Certificate", "BaseRelocation", "Debug", "Architecture", "GlobalPtr", "TLS", "LoadConfig", "BoundImport", "IAT", "DelayImport", "CLR", "Reserved" };
                          for (int i = 0; i < dirs.Count && i < dirNames.Length; i++)
                          {
                              var d = dirs[i];
                              if (d.VirtualAddress != 0 || d.Size != 0)
                                  sb.AppendLine($"  [{i}] {dirNames[i]}: RVA=0x{d.VirtualAddress:X} Size=0x{d.Size:X}");
                          }
                          sb.AppendLine();

                          // Has managed metadata?
                          bool hasCLR = hdr.CorHeader != null;
                          sb.AppendLine($".NET CLR Header: {(hasCLR ? "YES" : "NO")}");
                          if (hasCLR)
                          {
                              var clr = hdr.CorHeader.Value;
                              sb.AppendLine($"  Flags: 0x{clr.Flags:X}");
                              sb.AppendLine($"  Metadata RVA: 0x{clr.MetadataTable RVA:X}");
                              sb.AppendLine($"  Entry point token: 0x{clr.EntryPointTokenOrRVA:X}");
                          }
                          sb.AppendLine();

                          // Try to read imports
                          sb.AppendLine("--- Import Analysis ---");
                          try
                          {
                              var metadataReader = peReader.GetMetadataReader();
                              sb.AppendLine($"MetadataTables: Version={metadataReader.VersionString}");
                              sb.AppendLine($"Assembly count: {metadataReader.GetTableRowCount(TableIndex.AssemblyDef)}");
                              sb.AppendLine($"TypeRef count: {metadataReader.GetTableRowCount(TableIndex.TypeRef)}");
                              sb.AppendLine($"MemberRef count: {metadataReader.GetTableRowCount(TableIndex.MemberRef)}");

                              // List types
                              foreach (var typeHandle in metadataReader.TypeDefinitions)
                              {
                                  var typeDef = metadataReader.GetTypeDefinition(typeHandle);
                                  var ns = metadataReader.GetString(typeDef.Namespace);
                                  var nm = metadataReader.GetString(typeDef.Name);
                                  sb.AppendLine($"  Type: {(ns.Length > 0 ? ns + "." : "")}{nm}");
                              }
                          }
                          catch (Exception ex)
                          {
                              sb.AppendLine($"  No .NET metadata: {ex.Message}");
                          }
                          sb.AppendLine();

                          // Read PE resources
                          sb.AppendLine("--- Resources ---");
                          try
                          {
                              if (peReader.HasMetadata)
                              {
                                  var mr = peReader.GetMetadataReader();
                                  sb.AppendLine($"Has metadata: Yes, {mr.GetTableRowCount(TableIndex.AssemblyDef)} assemblies");
                              }
                              else
                              {
                                  sb.AppendLine("Has metadata: No (native PE)");
                              }
                          }
                          catch
                          {
                              sb.AppendLine("Metadata not readable");
                          }

                          // Hex dump of first 512 bytes
                          sb.AppendLine();
                          sb.AppendLine("--- First 256 bytes hex ---");
                          fs.Position = 0;
                          var buf = new byte[256];
                          fs.Read(buf, 0, 256);
                          for (int i = 0; i < 256; i += 16)
                          {
                              var hex = "";
                              var ascii = "";
                              for (int j = 0; j < 16 && i + j < 256; j++)
                              {
                                  hex += $"{buf[i + j]:X2} ";
                                  ascii += (buf[i + j] >= 32 && buf[i + j] < 127) ? (char)buf[i + j] : '.';
                              }
                              sb.AppendLine($"  {i:X4}: {hex,-48} {ascii}");
                          }

                          File.WriteAllText($"{outDir}/pe_analysis.txt", sb.ToString());
                          Console.WriteLine($"OK: {exe}");
                      }
                      catch (Exception ex)
                      {
                          File.WriteAllText($"{outDir}/pe_analysis.txt", $"Error: {ex.Message}");
                          Console.WriteLine($"ERROR: {exe}: {ex.Message}");
                      }
                  }
              }
          }
          '@

          $csproj = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <AllowUnsafeBlocks>true</AllowUnsafeBlocks>
            </PropertyGroup>
          </Project>
          "@

          New-Item -ItemType Directory -Path "pe_analyzer" -Force
          $script | Out-File "pe_analyzer/Program.cs" -Encoding UTF8
          $csproj | Out-File "pe_analyzer/pe_analyzer.csproj" -Encoding UTF8
          cd pe_analyzer
          dotnet run 2>&1
          cd ..

          # Copy results to output folders
          foreach ($exe in @("WD2_FLiNG_Trainer","WD2_FLiNG_EAC","WD2_Generic_Trainer","WD2_Baracuda_Trainer")) {
            if (Test-Path "pe_analyzer/$exe-pe_analysis.txt") {
              Copy-Item "pe_analyzer/$exe-pe_analysis.txt" "output/$exe/pe_analysis.txt" -Force 2>$null
            }
          }
        shell: pwsh

      - name: Extract all strings from exes
        run: |
          $exes = @(
            "WD2_FLiNG_Trainer.exe",
            "WD2_FLiNG_EAC.exe",
            "WD2_Generic_Trainer.exe",
            "WD2_Baracuda_Trainer.exe"
          )
          foreach ($exe in $exes) {
            $name = [IO.Path]::GetFileNameWithoutExtension($exe)
            $outDir = "output\$name"
            New-Item -ItemType Directory -Path $outDir -Force

            Write-Host "=== Extracting strings: $exe ==="

            # ASCII strings (min 6 chars)
            $bytes = [IO.File]::ReadAllBytes($exe)
            $asciiStrings = @()
            $current = ""
            for ($i = 0; $i -lt $bytes.Length; $i++) {
              $b = $bytes[$i]
              if ($b -ge 32 -and $b -lt 127) {
                $current += [char]$b
              } else {
                if ($current.Length -ge 6) { $asciiStrings += $current }
                $current = ""
              }
            }

            # Unicode strings (min 6 chars)
            $unicodeStrings = @()
            $current = ""
            for ($i = 0; $i -lt $bytes.Length - 1; $i += 2) {
              $w = [BitConverter]::ToUInt16($bytes, $i)
              if ($w -ge 32 -and $w -lt 127) {
                $current += [char]$w
              } else {
                if ($current.Length -ge 6) { $unicodeStrings += $current }
                $current = ""
              }
            }

            $result = "=== ASCII Strings (min 6 chars) ===`n"
            $result += ($asciiStrings -join "`n")
            $result += "`n`n=== Unicode Strings (min 6 chars) ===`n"
            $result += ($unicodeStrings -join "`n")
            $result | Out-File "$outDir/strings.txt" -Encoding UTF8

            Write-Host "  ASCII: $($asciiStrings.Count), Unicode: $($unicodeStrings.Count)"
          }
        shell: pwsh

      - name: Extract PE imports
        run: |
          $exes = @(
            "WD2_FLiNG_Trainer.exe",
            "WD2_FLiNG_EAC.exe",
            "WD2_Generic_Trainer.exe",
            "WD2_Baracuda_Trainer.exe"
          )
          foreach ($exe in $exes) {
            $name = [IO.Path]::GetFileNameWithoutExtension($exe)
            $outDir = "output\$name"

            $bytes = [IO.File]::ReadAllBytes($exe)

            # Find DLL names in import table (common Windows DLLs)
            $dllNames = @("kernel32.dll","user32.dll","advapi32.dll","ntdll.dll","ole32.dll","comctl32.dll",
                          "gdi32.dll","shell32.dll","msvcrt.dll","ws2_32.dll","wininet.dll","urlmon.dll",
                          "crypt32.dll","wldap32.dll","winmm.dll","mpr.dll","imm32.dll","version.dll",
                          "comdlg32.dll","netapi32.dll","psapi.dll","secur32.dll","shlwapi.dll",
                          "userenv.dll","uxtheme.dll","dwmapi.dll","propsys.dll","shell32.dll",
                          "mscoree.dll","mscorlib.dll","mscorwks.dll","d3d9.dll","d3d11.dll",
                          "opengl32.dll","glu32.dll","dbghelp.dll","imagehlp.dll","Rpcrt4.dll")

            $found = @()
            $text = [Text.Encoding]::ASCII.GetString($bytes)
            foreach ($dll in $dllNames) {
              if ($text.ToLower().Contains($dll.ToLower())) {
                $found += $dll
              }
            }

            # Also find all string references that look like DLL imports
            $importPattern = [regex]::Matches($text, "[a-zA-Z0-9_]+\.dll")
            $allDlls = @()
            foreach ($m in $importPattern) {
              $val = $m.Value.ToLower()
              if ($val -notin $allDlls) { $allDlls += $val }
            }

            $result = "=== Detected DLL imports ===`n"
            $result += ($found -join "`n")
            $result += "`n`n=== All .dll references found ===`n"
            $result += ($allDlls -join "`n")
            $result | Out-File "$outDir/imports.txt" -Encoding UTF8
          }
        shell: pwsh

      - name: Extract PE resources
        run: |
          $exes = @(
            "WD2_FLiNG_Trainer.exe",
            "WD2_FLiNG_EAC.exe",
            "WD2_Generic_Trainer.exe",
            "WD2_Baracuda_Trainer.exe"
          )
          foreach ($exe in $exes) {
            $name = [IO.Path]::GetFileNameWithoutExtension($exe)
            $outDir = "output\$name"
            New-Item -ItemType Directory -Path "$outDir\resources" -Force

            Write-Host "=== Extracting resources: $exe ==="

            $bytes = [IO.File]::ReadAllBytes($exe)
            $text = [Text.Encoding]::ASCII.GetString($bytes)

            # Find RT_ICON, RT_BITMAP, RT_DIALOG, RT_STRING, RT_VERSION patterns
            $resInfo = "=== Resource info for $exe ===`n"

            # Look for version info
            $verPattern = [regex]::Matches($text, "(?i)(FileVersion|ProductVersion|CompanyName|FileDescription|InternalName|OriginalFileName|ProductName|LegalCopyright)[\x00-\x1F]{1,50}([^\x00-\x1F]{2,})")
            $resInfo += "--- Version Info ---`n"
            foreach ($m in $verPattern) {
              $resInfo += "  $($m.Groups[1].Value): $($m.Groups[2].Value)`n"
            }

            # Find common string resources
            $resInfo += "`n--- Common strings ---`n"
            $patterns = @{
              "Copyright" = "(?i)copyright\s+[^\x00]+"
              "Version" = "(?i)version\s+\d+\.\d+"
              "Watch Dogs" = "Watch\s*Dogs"
              "Trainer" = "(?i)trainer"
              "Cheat" = "(?i)cheat"
              "Health" = "(?i)(health|hp|life)"
              "Ammo" = "(?i)(ammo|bullet|ammunition)"
              "Money" = "(?i)(money|cash|gold|coins)"
              "Speed" = "(?i)(speed|velocity)"
              "Infinite" = "(?i)(infinite|inf|unlimited)"
              "God Mode" = "(?i)(god\s*mode|godmode|invincib)"
              "No Clip" = "(?i)(no\s*clip|noclip|fly)"
              "Teleport" = "(?i)(teleport|tp|warp)"
            }

            foreach ($key in $patterns.Keys) {
              $matches = [regex]::Matches($text, $patterns[$key])
              if ($matches.Count -gt 0) {
                $unique = @()
                foreach ($m in $matches) { $v = $m.Value.Trim(); if ($v -notin $unique -and $v.Length -lt 200) { $unique += $v } }
                $resInfo += "  [$key] ($($unique.Count) matches):`n"
                foreach ($u in $unique[0..([Math]::Min(9, $unique.Count-1))]) {
                  $resInfo += "    $u`n"
                }
              }
            }

            $resInfo | Out-File "$outDir/resources.txt" -Encoding UTF8
          }
        shell: pwsh

      - name: Try ILSpy disassembly fallback
        run: |
          foreach ($exe in @("WD2_FLiNG_Trainer.exe","WD2_FLiNG_EAC.exe","WD2_Generic_Trainer.exe","WD2_Baracuda_Trainer.exe")) {
            $name = [IO.Path]::GetFileNameWithoutExtension($exe)
            $outDir = "output\$name"
            # Try IL disassembly
            try {
              $output = ilspycmd -l "$exe" 2>&1 | Out-String
              $output | Out-File "$outDir\ilspy_disasm.txt" -Encoding UTF8
            } catch {
              "Not a .NET assembly - IL disassembly not possible" | Out-File "$outDir\ilspy_disasm.txt"
            }
          }
        shell: pwsh

      - name: Create final zip per trainer
        run: |
          $exes = @("WD2_FLiNG_Trainer","WD2_FLiNG_EAC","WD2_Generic_Trainer","WD2_Baracuda_Trainer")
          foreach ($name in $exes) {
            Compress-Archive -Path "output\$name\*" -DestinationPath "output\${name}_full_analysis.zip" -Force
          }
          Compress-Archive -Path "output\*\*" -DestinationPath "output\ALL_ANALYSIS.zip" -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-analysis-dnspy-ilspy
          path: output/
          retention-days: 30

      - name: Commit results back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ -f
          git diff --cached --quiet && echo "Nothing new" && exit 0
          git commit -m "Add full PE analysis + ILSpy/dnSpy results [skip ci]"
          git push
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
