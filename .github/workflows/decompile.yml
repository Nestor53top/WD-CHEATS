name: Decompile Trainers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  decompile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install ILSpy CLI
        run: dotnet tool install --global ilspycmd

      - name: Download dnSpyEx
        shell: pwsh
        run: |
          $url = "https://github.com/dnSpyEx/dnSpy/releases/latest/download/dnSpy-net-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile dnSpy.zip
          Expand-Archive -Path dnSpy.zip -DestinationPath dnSpy -Force

      - name: Analyze all trainers (ILSpy + dnSpy + PE + strings)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $exes = @(
            @{ Name="WD2_FLiNG_Trainer"; File="WD2_FLiNG_Trainer.exe" },
            @{ Name="WD2_FLiNG_EAC"; File="WD2_FLiNG_EAC.exe" },
            @{ Name="WD2_Generic_Trainer"; File="WD2_Generic_Trainer.exe" },
            @{ Name="WD2_Baracuda_Trainer"; File="WD2_Baracuda_Trainer.exe" }
          )

          foreach ($item in $exes) {
            $name = $item.Name
            $file = $item.File
            $outDir = "output\$name"
            New-Item -ItemType Directory -Path $outDir -Force | Out-Null

            Write-Host "`n==============================="
            Write-Host "ANALYZING: $file"
            Write-Host "==============================="

            # --- ILSpy ---
            Write-Host "`n--- ILSpy decompilation ---"
            $ilspyOut = ""
            try {
              $ilspyOut = & ilspycmd -p -o "$outDir\ilspy_project" "$file" 2>&1 | Out-String
            } catch {
              $ilspyOut = $_.Exception.Message
            }
            if ($ilspyOut -match "managed metadata") {
              "NOT a .NET assembly. ILSpy cannot decompile native PE.`n`nILSpy output:`n$ilspyOut" | Out-File "$outDir\ilspy_result.txt"
              Write-Host "ILSpy: not .NET assembly"
            } else {
              "ILSpy decompilation completed.`n`nOutput:`n$ilspyOut" | Out-File "$outDir\ilspy_result.txt"
              Write-Host "ILSpy: done"
            }

            # --- dnSpy ---
            Write-Host "--- dnSpy analysis ---"
            $dnSpyExe = Get-ChildItem -Path "dnSpy" -Recurse -Filter "dnSpy.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            @"
dnSpy Analysis for $file
========================
dnSpy is a GUI decompiler for .NET assemblies.
This PE file is a native executable (not .NET).
dnSpy cannot decompile it directly.

dnSpy GUI is available in the dnSpy/ folder for manual inspection.
For native code, use Ghidra or IDA Pro for full disassembly.
"@ | Out-File "$outDir\dnspy_result.txt"
            Write-Host "dnSpy: native PE, GUI-only"

            # --- PE Header Analysis ---
            Write-Host "--- PE header analysis ---"
            $bytes = [IO.File]::ReadAllBytes($file)
            $size = $bytes.Length

            # Parse PE header manually
            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            $peSig = [Text.Encoding]::ASCII.GetString($bytes, $peOffset, 4)
            $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
            $numSections = [BitConverter]::ToUInt16($bytes, $peOffset + 6)
            $timestamp = [BitConverter]::ToUInt32($bytes, $peOffset + 4)
            $optHeaderOffset = $peOffset + 24
            $optMagic = [BitConverter]::ToUInt16($bytes, $optHeaderOffset)
            $is64 = $optMagic -eq 0x20B

            $machineStr = switch ($machine) {
              0x14c { "x86 (i386)" }
              0x8664 { "x86-64 (AMD64)" }
              0x1c0 { "ARM" }
              0xAA64 { "ARM64" }
              default { "Unknown (0x$($machine.ToString('X4')))" }
            }

            $peInfo = @"
PE Header Analysis: $file
=========================
File size: $size bytes ($([Math]::Round($size/1024, 1)) KB)
PE Signature: $peSig
Machine: $machineStr (0x$($machine.ToString('X4')))
Sections: $numSections
Timestamp: $([DateTimeOffset]::FromUnixTimeSeconds($timestamp).ToString('yyyy-MM-dd HH:mm:ss UTC'))
PE Type: $(if ($is64) { 'PE32+ (64-bit)' } else { 'PE32 (32-bit)' })

"@

            # Parse section headers
            $sectionStart = $optHeaderOffset + if ($is64) { 240 } else { 224 }
            $peInfo += "Sections:`n"
            for ($i = 0; $i -lt $numSections -and ($sectionStart + $i * 40 + 40) -le $bytes.Length; $i++) {
              $off = $sectionStart + $i * 40
              $secName = [Text.Encoding]::ASCII.GetString($bytes, $off, 8).TrimEnd([char]0)
              $virtSize = [BitConverter]::ToUInt32($bytes, $off + 8)
              $virtAddr = [BitConverter]::ToUInt32($bytes, $off + 12)
              $rawSize = [BitConverter]::ToUInt32($bytes, $off + 16)
              $rawAddr = [BitConverter]::ToUInt32($bytes, $off + 20)
              $chars = [BitConverter]::ToUInt32($bytes, $off + 36)
              $peInfo += "  $secName : VirtSize=0x$($virtSize.ToString('X8')) VirtAddr=0x$($virtAddr.ToString('X8')) RawSize=0x$($rawSize.ToString('X8')) Chars=0x$($chars.ToString('X8'))`n"
            }

            $peInfo | Out-File "$outDir\pe_headers.txt"
            Write-Host "PE headers: done"

            # --- Import analysis ---
            Write-Host "--- Import analysis ---"
            $text = [Text.Encoding]::ASCII.GetString($bytes)
            $dllNames = @("kernel32.dll","user32.dll","advapi32.dll","ntdll.dll","ole32.dll","comctl32.dll",
              "gdi32.dll","shell32.dll","msvcrt.dll","ws2_32.dll","wininet.dll","urlmon.dll",
              "crypt32.dll","winmm.dll","mpr.dll","imm32.dll","version.dll","comdlg32.dll",
              "netapi32.dll","psapi.dll","secur32.dll","shlwapi.dll","userenv.dll","uxtheme.dll",
              "dwmapi.dll","oleaut32.dll","setupapi.dll","dbghelp.dll","imagehlp.dll","Rpcrt4.dll",
              "wldap32.dll","mscoree.dll","d3d9.dll","d3d11.dll","opengl32.dll","glu32.dll",
              "mswsock.dll","wshtcpip.dll","winhttp.dll","rasapi32.dll","iphlpapi.dll",
              "mpr.dll","cfgmgr32.dll","bcrypt.dll","ncrypt.dll","propsys.dll","dwrite.dll",
              "d2d1.dll","wtsapi32.dll","powrprof.dll","dxgi.dll","d3dcompiler_47.dll")

            $foundDlls = @()
            foreach ($dll in $dllNames) {
              if ($text.ToLower().Contains($dll)) { $foundDlls += $dll }
            }
            $allDllRefs = [regex]::Matches($text, "(?i)[a-zA-Z0-9_\-]+\.dll") | ForEach-Object { $_.Value.ToLower() } | Sort-Object -Unique

            @"
Import Analysis: $file
======================
Detected Windows DLL imports ($($foundDlls.Count)):
$($foundDlls -join "`n")

All .dll references found ($($allDllRefs.Count)):
$($allDllRefs -join "`n")
"@ | Out-File "$outDir\imports.txt"
            Write-Host "Imports: $($foundDlls.Count) DLLs"

            # --- Strings extraction ---
            Write-Host "--- String extraction ---"
            $asciiStrings = @()
            $current = ""
            for ($i = 0; $i -lt $bytes.Length; $i++) {
              $b = $bytes[$i]
              if ($b -ge 32 -and $b -lt 127) { $current += [char]$b }
              else { if ($current.Length -ge 6) { $asciiStrings += $current }; $current = "" }
            }

            $unicodeStrings = @()
            $current = ""
            for ($i = 0; $i -lt $bytes.Length - 1; $i += 2) {
              $w = [BitConverter]::ToUInt16($bytes, $i)
              if ($w -ge 32 -and $w -lt 127) { $current += [char]$w }
              else { if ($current.Length -ge 6) { $unicodeStrings += $current }; $current = "" }
            }

            # Categorize interesting strings
            $interesting = @()
            $patterns = @{
              "TRAINER" = "(?i)(trainer|cheat|hack|mod)"
              "MEMORY" = "(?i)(readprocessmemory|writeprocessmemory|virtualalloc|openprocess)"
              "GAME" = "(?i)(watch.?dogs|wd2|ubisoft|uplay)"
              "FEATURE" = "(?i)(health|ammo|money|speed|god|infinite|noclip|teleport|unlimited|invincib)"
              "KEYBIND" = "(?i)(hotkey|keybind|f1\s|f2\s|f3\s|f4\s|numpad|insert|delete)"
              "PROCESS" = "(?i)(findwindow|enumerateprocess|processid|threadid)"
              "MEMORY_ADDR" = "(?i)(0x[0-9a-f]{4,}|base\+|offset)"
            }
            foreach ($s in ($asciiStrings + $unicodeStrings)) {
              foreach ($cat in $patterns.Keys) {
                if ($s -match $patterns[$cat] -and $s.Length -lt 300) {
                  $interesting += "[$cat] $s"
                }
              }
            }

            @"
All ASCII Strings ($($asciiStrings.Count)):
$($asciiStrings -join "`n")

All Unicode Strings ($($unicodeStrings.Count)):
$($unicodeStrings -join "`n")

Interesting Strings ($($interesting.Count)):
$($interesting | Sort-Object -Unique | Select-Object -First 200 -join "`n")
"@ | Out-File "$outDir\strings.txt" -Encoding UTF8
            Write-Host "Strings: ASCII=$($asciiStrings.Count) Unicode=$($unicodeStrings.Count) Interesting=$($interesting.Count)"

            # --- Version info ---
            Write-Host "--- Version info ---"
            $verMatches = [regex]::Matches($text, "(?i)(FileVersion|ProductVersion|CompanyName|FileDescription|InternalName|OriginalFileName|ProductName|LegalCopyright|LegalTrademarks|Comments|PrivateBuild|SpecialBuild)[\x00-\x1F]{1,80}([^\x00-\x1F]{2,100})")
            $verInfo = "Version Info: $file`n========================`n"
            foreach ($m in $verMatches) {
              $key = $m.Groups[1].Value
              $val = $m.Groups[2].Value.Trim()
              if ($val.Length -gt 2) { $verInfo += "$key : $val`n" }
            }
            $verInfo | Out-File "$outDir\version_info.txt"
            Write-Host "Version info: done"

            # --- Delphi detection ---
            Write-Host "--- Delphi/FPC detection ---"
            $delphiInfo = "Delphi/FPC Analysis: $file`n========================`n"
            $delphiChecks = @{
              "Delphi VCL" = "TForm|TButton|TLabel|TEdit|TComboBox|TListView"
              "Delphi RTL" = "@Sysutils@|@Classes@|@Forms@|@Controls@"
              "Borland" = "Borland|Embarcadero|CodeGear"
              "FreePascal" = "FreePascal|FPC|Lazarus"
              "Qt" = "Qt4|Qt5|QtCore|QtGui|QWidget"
              "MFC" = "CWinApp|CWnd|AfxInit"
              "WxWidgets" = "wxApp|wxFrame|wxWindow"
              "Dear ImGui" = "ImGui|imgui|IMGUI"
            }
            foreach ($key in $delphiChecks.Keys) {
              $matches = [regex]::Matches($text, $delphiChecks[$key])
              if ($matches.Count -gt 0) {
                $unique = $matches | ForEach-Object { $_.Value } | Sort-Object -Unique
                $delphiInfo += "FOUND $key ($($matches.Count) matches): $($unique -join ', ')`n"
              }
            }
            $delphiInfo | Out-File "$outDir\language_detect.txt"
            Write-Host "Language detect: done"

            Write-Host "DONE: $file"
          }

          Write-Host "`n==============================="
          Write-Host "ALL ANALYSES COMPLETE"
          Write-Host "==============================="

      - name: Create zip per trainer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $names = @("WD2_FLiNG_Trainer","WD2_FLiNG_EAC","WD2_Generic_Trainer","WD2_Baracuda_Trainer")
          foreach ($n in $names) {
            if (Test-Path "output\$n") {
              Compress-Archive -Path "output\$n\*" -DestinationPath "output\${n}_analysis.zip" -Force
            }
          }
          if (Test-Path "output") {
            Compress-Archive -Path "output\*\*" -DestinationPath "output\ALL_ANALYSIS.zip" -Force -ErrorAction SilentlyContinue
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-dnspy-ilspy
          path: output/
          retention-days: 30

      - name: Commit results back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ -f
          git diff --cached --quiet && echo "Nothing new" && exit 0
          git commit -m "Add full PE analysis + ILSpy/dnSpy results [skip ci]"
          git push
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
