name: Decompile Trainers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install ILSpy CLI
        run: dotnet tool install --global ilspycmd

      - name: Download dnSpyEx
        shell: pwsh
        run: |
          $url = "https://github.com/dnSpyEx/dnSpy/releases/latest/download/dnSpy-net-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile dnSpy.zip
          Expand-Archive -Path dnSpy.zip -DestinationPath dnSpy -Force

      - name: ILSpy analysis
        shell: bash
        run: |
          for exe in *.exe; do
            name="${exe%.exe}"
            mkdir -p "output/$name"
            echo "=== ILSpy: $exe ==="
            ilspycmd -p -o "output/$name/ilspy_project" "$exe" 2>&1 | tee "output/$name/ilspy_output.txt" || true
            echo "Done: $exe"
          done

      - name: dnSpy info
        shell: bash
        run: |
          for exe in *.exe; do
            name="${exe%.exe}"
            mkdir -p "output/$name"
            cat > "output/$name/dnspy_result.txt" << DNSPYEOF
          dnSpy Analysis for $exe
          =======================
          dnSpy is a GUI decompiler for .NET assemblies.
          This PE is native code - dnSpy cannot decompile it.
          Download dnSpy from: https://github.com/dnSpyEx/dnSpy/releases
          to inspect manually in GUI.
          DNSPYEOF
            echo "Done: $exe"
          done

      - name: PE analysis and strings
        shell: bash
        run: |
          for exe in *.exe; do
            name="${exe%.exe}"
            mkdir -p "output/$name"
            echo "=== PE Analysis: $exe ===" > "output/$name/pe_analysis.txt"
            python3 scripts/pe_analyze.py "$exe" >> "output/$name/pe_analysis.txt" 2>&1
            echo "Done: $exe"
          done

      - name: Create zip archives
        shell: pwsh
        run: |
          $dirs = Get-ChildItem -Path output -Directory
          foreach ($d in $dirs) {
            $zipPath = "output/$($d.Name)_full_analysis.zip"
            Compress-Archive -Path "$($d.FullName)/*" -DestinationPath $zipPath -Force
            Write-Host "Created: $zipPath"
          }
          $allItems = Get-ChildItem -Path output -Exclude "*.zip" | Where-Object { $_.PSIsContainer }
          if ($allItems) {
            Compress-Archive -Path ($allItems | ForEach-Object { "$($_.FullName)/*" }) -DestinationPath "output/ALL_ANALYSIS.zip" -Force
            Write-Host "Created: output/ALL_ANALYSIS.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: output/
          retention-days: 30

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ -f
          git diff --cached --quiet && echo "Nothing new" && exit 0
          git commit -m "Add decompiled analysis results"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push
        shell: bash
